<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — UNEOM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F2C4D;
      color: #FAFAFA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 480px; }
    .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 1.5rem; color: #D4A853; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 600; }
    p { font-size: 1rem; opacity: 0.8; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #D4A853;
      color: #0F2C4D;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .ar { direction: rtl; font-size: 0.9rem; margin-top: 1.5rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">UNEOM</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <a href="/" class="btn">Try again</a>
    <p class="ar">يبدو أنك غير متصل بالإنترنت. يرجى التحقق من اتصالك والمحاولة مرة أخرى.</p>
  </div>
</body>
</html>
